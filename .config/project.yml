issue_tracker: github

review:
  enabled: true
  # Codex を含めてレビュー実行する場合は true（CLI の --with-codex でも有効化可能）
  with_codex: false

repository:
  owner: your-org
  name: your-repo
  full_name: your-org/your-repo
  base_branch: main
  # ブランチのプレフィックス（例: "feature" → feature-123 から issue 番号を抽出）
  branch_prefix: feature
